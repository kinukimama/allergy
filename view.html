<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>アレルギー情報</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0F0F0F;
      --card: #1A1A1A;
      --accent: #FF5C47;
      --accent-glow: rgba(255,92,71,0.2);
      --text: #F5F2ED;
      --text-muted: #888;
      --border: #2A2A2A;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      font-family: 'Noto Sans JP', sans-serif;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 32px 20px 48px;
    }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 36px;
    }

    .badge {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.18em;
      color: var(--accent);
      border: 1px solid var(--accent);
      border-radius: 4px;
      padding: 3px 10px;
      text-transform: uppercase;
    }

    .timestamp {
      font-size: 11px;
      color: var(--text-muted);
      font-family: 'DM Mono', monospace;
    }

    /* 警告バナー */
    .warning-banner {
      background: var(--accent);
      border-radius: 14px;
      padding: 18px 20px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: 0 0 32px var(--accent-glow);
    }

    .warning-icon {
      font-size: 28px;
      flex-shrink: 0;
    }

    .warning-text h2 {
      font-size: 17px;
      font-weight: 700;
      color: white;
      line-height: 1.3;
    }

    .warning-text p {
      font-size: 12px;
      color: rgba(255,255,255,0.8);
      margin-top: 3px;
    }

    /* 名前カード */
    .name-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 18px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .name-icon {
      width: 40px;
      height: 40px;
      background: var(--accent-glow);
      border: 1px solid var(--accent);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .name-label {
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 2px;
    }

    .name-value {
      font-size: 18px;
      font-weight: 700;
    }

    /* アレルゲンカード */
    .section-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .allergen-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 20px;
    }

    .allergen-card {
      background: var(--card);
      border: 1px solid #2E1512;
      border-left: 4px solid var(--accent);
      border-radius: 10px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      animation: fadeIn 0.3s ease both;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateX(-8px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .allergen-emoji {
      font-size: 26px;
      width: 36px;
      text-align: center;
    }

    .allergen-name {
      font-size: 18px;
      font-weight: 700;
    }

    .allergen-desc {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* その他 */
    .other-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 20px;
    }

    .other-text {
      font-size: 15px;
      line-height: 1.7;
      white-space: pre-wrap;
    }

    /* フッター */
    .footer {
      margin-top: auto;
      text-align: center;
      padding-top: 32px;
    }

    .footer-note {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.7;
    }

    .footer-brand {
      display: inline-block;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--accent);
      margin-top: 12px;
      letter-spacing: 0.1em;
    }

    /* エラー */
    .error-state {
      text-align: center;
      padding: 60px 20px;
    }

    .error-state h2 {
      font-size: 20px;
      margin-bottom: 12px;
    }

    .error-state p {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.7;
    }
  </style>
</head>
<body>

  <div class="top-bar">
    <div class="badge">⚠ Allergy Card</div>
    <div class="timestamp" id="timestamp"></div>
  </div>

  <div id="content"></div>

  <div class="footer">
    <p class="footer-note">このカードの情報は本人が登録したものです。<br>アレルゲンを含む食材の使用を避けてください。</p>
    <span class="footer-brand">ALLERGY CARD</span>
  </div>

  <script>
    // タイムスタンプ
    const now = new Date();
    document.getElementById('timestamp').textContent =
      `${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;

    const ALLERGEN_META = {
      '卵':   { icon: '🥚', desc: 'Egg' },
      '乳':   { icon: '🥛', desc: 'Dairy / Milk' },
      '小麦': { icon: '🌾', desc: 'Wheat / Gluten' },
      'えび': { icon: '🦐', desc: 'Shrimp / Prawn' },
      'かに': { icon: '🦀', desc: 'Crab' },
      'そば': { icon: '🍜', desc: 'Soba / Buckwheat' },
      '落花生': { icon: '🥜', desc: 'Peanut' },
      'くるみ': { icon: '🌰', desc: 'Walnut' },
    };

    const params = new URLSearchParams(location.search);
    const name = params.get('name') || '';
    const dataRaw = params.get('data') || '';
    const other = params.get('other') ? decodeURIComponent(params.get('other')) : '';

    const allergens = dataRaw ? dataRaw.split(',').filter(Boolean) : [];
    const content = document.getElementById('content');

    if (!allergens.length && !other) {
      content.innerHTML = `
        <div class="error-state">
          <h2>情報がありません</h2>
          <p>QRコードが正しく読み取れなかったか、<br>情報が登録されていません。</p>
        </div>`;
    } else {
      let html = '';

      // 警告バナー
      html += `
        <div class="warning-banner">
          <div class="warning-icon">⚠️</div>
          <div class="warning-text">
            <h2>アレルギーをお持ちのお客様です</h2>
            <p>以下の食材・成分に注意してご対応ください</p>
          </div>
        </div>`;

      // 名前
      if (name) {
        html += `
          <div class="name-card">
            <div class="name-icon">👤</div>
            <div>
              <div class="name-label">お名前</div>
              <div class="name-value">${escHtml(name)} 様</div>
            </div>
          </div>`;
      }

      // アレルゲン
      if (allergens.length) {
        html += `<div class="section-label">アレルゲン（${allergens.length}品目）</div>`;
        html += `<div class="allergen-list">`;
        allergens.forEach((a, i) => {
          const meta = ALLERGEN_META[a] || { icon: '⚠️', desc: 'Allergen' };
          html += `
            <div class="allergen-card" style="animation-delay:${i * 0.07}s">
              <div class="allergen-emoji">${meta.icon}</div>
              <div>
                <div class="allergen-name">${escHtml(a)}</div>
                <div class="allergen-desc">${meta.desc}</div>
              </div>
            </div>`;
        });
        html += `</div>`;
      }

      // その他
      if (other) {
        html += `<div class="section-label">その他・備考</div>`;
        html += `<div class="other-card"><p class="other-text">${escHtml(other)}</p></div>`;
      }

      content.innerHTML = html;
    }

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
  </script>
</body>
</html>
