<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>アレルギーカード</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    :root {
      --bg: #F5F2ED;
      --card: #FFFFFF;
      --accent: #D94F3D;
      --accent-light: #FDECEA;
      --text: #1A1A1A;
      --text-muted: #777;
      --border: #E0DCD6;
      --check-bg: #FFF8F7;
      --shadow: 0 2px 16px rgba(0,0,0,0.08);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      font-family: 'Noto Sans JP', sans-serif;
      color: var(--text);
      min-height: 100vh;
      padding: 24px 16px 60px;
    }

    header {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-tag {
      display: inline-block;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.15em;
      color: var(--accent);
      background: var(--accent-light);
      border: 1px solid #f5c0ba;
      border-radius: 4px;
      padding: 3px 10px;
      margin-bottom: 12px;
    }

    h1 {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.2;
    }

    h1 span {
      color: var(--accent);
    }

    .subtitle {
      margin-top: 8px;
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.6;
    }

    .card {
      background: var(--card);
      border-radius: 16px;
      padding: 24px;
      box-shadow: var(--shadow);
      margin-bottom: 16px;
    }

    .section-title {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .allergens-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .allergen-item {
      position: relative;
    }

    .allergen-item input[type="checkbox"] {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
    }

    .allergen-item label {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      background: var(--check-bg);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.15s ease;
      font-size: 14px;
      font-weight: 500;
      user-select: none;
    }

    .allergen-item label:hover {
      border-color: #f5c0ba;
      background: var(--accent-light);
    }

    .allergen-item input:checked + label {
      background: var(--accent-light);
      border-color: var(--accent);
      color: var(--accent);
    }

    .allergen-item label .icon {
      font-size: 20px;
      width: 28px;
      text-align: center;
    }

    .allergen-item label .checkmark {
      margin-left: auto;
      width: 18px;
      height: 18px;
      border: 1.5px solid var(--border);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s ease;
      flex-shrink: 0;
    }

    .allergen-item input:checked + label .checkmark {
      background: var(--accent);
      border-color: var(--accent);
    }

    .allergen-item input:checked + label .checkmark::after {
      content: '✓';
      color: white;
      font-size: 11px;
      font-weight: 700;
    }

    .other-section {
      margin-top: 0;
    }

    .other-section textarea {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 14px;
      color: var(--text);
      background: var(--check-bg);
      resize: none;
      outline: none;
      transition: border-color 0.15s;
      line-height: 1.6;
    }

    .other-section textarea:focus {
      border-color: var(--accent);
      background: var(--accent-light);
    }

    .other-section textarea::placeholder {
      color: #bbb;
    }

    .name-input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 14px;
      color: var(--text);
      background: var(--check-bg);
      outline: none;
      transition: border-color 0.15s;
    }

    .name-input:focus {
      border-color: var(--accent);
      background: var(--accent-light);
    }

    .name-input::placeholder {
      color: #bbb;
    }

    .btn-generate {
      width: 100%;
      padding: 16px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 12px;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s ease;
      letter-spacing: 0.03em;
      box-shadow: 0 4px 12px rgba(217,79,61,0.3);
    }

    .btn-generate:hover {
      background: #c44232;
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(217,79,61,0.35);
    }

    .btn-generate:active {
      transform: translateY(0);
    }

    /* QR Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(4px);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .modal-overlay.open {
      display: flex;
    }

    .modal {
      background: white;
      border-radius: 20px;
      padding: 32px 24px 28px;
      width: 100%;
      max-width: 360px;
      text-align: center;
      animation: slideUp 0.25s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .modal h2 {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .modal-subtitle {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 24px;
    }

    #qr-container {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }

    #qr-container canvas, #qr-container img {
      border-radius: 8px;
    }

    .modal-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: center;
      margin-bottom: 24px;
    }

    .modal-tag {
      background: var(--accent-light);
      color: var(--accent);
      border: 1px solid #f5c0ba;
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 13px;
      font-weight: 500;
    }

    .btn-close {
      width: 100%;
      padding: 13px;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-close:hover {
      background: var(--border);
    }

    .no-selection-msg {
      font-size: 13px;
      color: var(--accent);
      text-align: center;
      padding: 8px 0 4px;
      display: none;
    }

    .spacer { height: 8px; }
  </style>
</head>
<body>

  <header>
    <div class="logo-tag">ALLERGY CARD</div>
    <h1>アレルギー<span>カード</span></h1>
    <p class="subtitle">QRコードを店員に見せるだけで、<br>あなたのアレルギー情報が伝わります。</p>
  </header>

  <!-- 名前 -->
  <div class="card">
    <div class="section-title">お名前（任意）</div>
    <input class="name-input" type="text" id="name-input" placeholder="例：田中 花子" maxlength="30" />
  </div>

  <!-- アレルゲン選択 -->
  <div class="card">
    <div class="section-title">アレルゲン（8品目）</div>
    <div class="allergens-grid">
      <div class="allergen-item">
        <input type="checkbox" id="al-egg" value="卵">
        <label for="al-egg"><span class="icon">🥚</span>卵<span class="checkmark"></span></label>
      </div>
      <div class="allergen-item">
        <input type="checkbox" id="al-milk" value="乳">
        <label for="al-milk"><span class="icon">🥛</span>乳製品<span class="checkmark"></span></label>
      </div>
      <div class="allergen-item">
        <input type="checkbox" id="al-wheat" value="小麦">
        <label for="al-wheat"><span class="icon">🌾</span>小麦<span class="checkmark"></span></label>
      </div>
      <div class="allergen-item">
        <input type="checkbox" id="al-shrimp" value="えび">
        <label for="al-shrimp"><span class="icon">🦐</span>えび<span class="checkmark"></span></label>
      </div>
      <div class="allergen-item">
        <input type="checkbox" id="al-crab" value="かに">
        <label for="al-crab"><span class="icon">🦀</span>かに<span class="checkmark"></span></label>
      </div>
      <div class="allergen-item">
        <input type="checkbox" id="al-soba" value="そば">
        <label for="al-soba"><span class="icon">🍜</span>そば<span class="checkmark"></span></label>
      </div>
      <div class="allergen-item">
        <input type="checkbox" id="al-peanut" value="落花生">
        <label for="al-peanut"><span class="icon">🥜</span>落花生<span class="checkmark"></span></label>
      </div>
      <div class="allergen-item">
        <input type="checkbox" id="al-walnut" value="くるみ">
        <label for="al-walnut"><span class="icon">🌰</span>くるみ<span class="checkmark"></span></label>
      </div>
    </div>
  </div>

  <!-- その他 -->
  <div class="card other-section">
    <div class="section-title">その他・備考</div>
    <textarea id="other-input" rows="3" placeholder="例：大豆アレルギーあり。ごま油はOK。"></textarea>
  </div>

  <p class="no-selection-msg" id="no-sel-msg">⚠️ アレルゲンを1つ以上選んでください</p>
  <div class="spacer"></div>

  <button class="btn-generate" onclick="generateQR()">QRコードを生成する</button>

  <!-- QR Modal -->
  <div class="modal-overlay" id="modal" onclick="closeModal(event)">
    <div class="modal">
      <h2>QRコード</h2>
      <p class="modal-subtitle">店員さんに読み取ってもらってください</p>
      <div id="qr-container"></div>
      <div class="modal-tags" id="modal-tags"></div>
      <button class="btn-close" onclick="closeModal(null)">閉じる</button>
    </div>
  </div>

  <script>
    const BASE_URL = (() => {
      const u = location.href;
      return u.substring(0, u.lastIndexOf('/') + 1) + 'view.html';
    })();

    // ページ読み込み時にlocalStorageから復元
    window.addEventListener('DOMContentLoaded', () => {
      const saved = JSON.parse(localStorage.getItem('allergyData') || '{}');
      if (saved.name) document.getElementById('name-input').value = saved.name;
      if (saved.allergens) {
        saved.allergens.forEach(v => {
          const el = document.querySelector(`input[value="${v}"]`);
          if (el) el.checked = true;
        });
      }
      if (saved.other) document.getElementById('other-input').value = saved.other;
    });

    function generateQR() {
      const name = document.getElementById('name-input').value.trim();
      const checked = [...document.querySelectorAll('.allergens-grid input:checked')].map(e => e.value);
      const other = document.getElementById('other-input').value.trim();

      if (checked.length === 0 && !other) {
        document.getElementById('no-sel-msg').style.display = 'block';
        return;
      }
      document.getElementById('no-sel-msg').style.display = 'none';

      // localStorageに保存
      localStorage.setItem('allergyData', JSON.stringify({ name, allergens: checked, other }));

      // URLを構築
      const params = new URLSearchParams();
      if (name) params.set('name', name);
      if (checked.length) params.set('data', checked.join(','));
      if (other) params.set('other', encodeURIComponent(other));
      const url = `${BASE_URL}?${params.toString()}`;

      // QR生成
      const container = document.getElementById('qr-container');
      container.innerHTML = '';
      new QRCode(container, {
        text: url,
        width: 200,
        height: 200,
        colorDark: '#1A1A1A',
        colorLight: '#FFFFFF',
        correctLevel: QRCode.CorrectLevel.M
      });

      // タグ表示
      const tagsEl = document.getElementById('modal-tags');
      tagsEl.innerHTML = '';
      const allItems = [...checked, ...(other ? [other] : [])];
      if (name) {
        const t = document.createElement('div');
        t.className = 'modal-tag';
        t.textContent = '👤 ' + name;
        tagsEl.appendChild(t);
      }
      allItems.forEach(item => {
        const t = document.createElement('div');
        t.className = 'modal-tag';
        t.textContent = item;
        tagsEl.appendChild(t);
      });

      document.getElementById('modal').classList.add('open');
    }

    function closeModal(e) {
      if (e === null || e.target === document.getElementById('modal')) {
        document.getElementById('modal').classList.remove('open');
      }
    }
  </script>
</body>
</html>
