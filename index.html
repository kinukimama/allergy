<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>アレルギーカード</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="common.css">
  <link rel="stylesheet" href="index.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>

  <header>
    <div class="logo-tag">ALLERGY CARD</div>
    <h1>アレルギー<span>カード</span></h1>
    <p class="subtitle">QRコードを店員さんに読み取ってもらうだけで、<br>あなたのアレルギー情報が伝わります。</p>
  </header>

  <!-- プロフィールタブ -->
  <div class="tabs-wrapper">
    <div id="tabs" class="tabs"></div>
  </div>

  <!-- アレルゲン選択 -->
  <div class="card">
    <div class="section-title">アレルゲン（8品目）</div>
    <div class="allergens-grid">
      <div class="allergen-item">
        <input type="checkbox" id="al-egg" value="卵">
        <label for="al-egg"><span class="icon">🥚</span>卵<span class="checkmark"></span></label>
      </div>
      <div class="allergen-item">
        <input type="checkbox" id="al-milk" value="乳">
        <label for="al-milk"><span class="icon">🥛</span>乳製品<span class="checkmark"></span></label>
      </div>
      <div class="allergen-item">
        <input type="checkbox" id="al-wheat" value="小麦">
        <label for="al-wheat"><span class="icon">🌾</span>小麦<span class="checkmark"></span></label>
      </div>
      <div class="allergen-item">
        <input type="checkbox" id="al-shrimp" value="えび">
        <label for="al-shrimp"><span class="icon">🦐</span>えび<span class="checkmark"></span></label>
      </div>
      <div class="allergen-item">
        <input type="checkbox" id="al-crab" value="かに">
        <label for="al-crab"><span class="icon">🦀</span>かに<span class="checkmark"></span></label>
      </div>
      <div class="allergen-item">
        <input type="checkbox" id="al-soba" value="そば">
        <label for="al-soba"><span class="icon">🍜</span>そば<span class="checkmark"></span></label>
      </div>
      <div class="allergen-item">
        <input type="checkbox" id="al-peanut" value="落花生">
        <label for="al-peanut"><span class="icon">🥜</span>落花生<span class="checkmark"></span></label>
      </div>
      <div class="allergen-item">
        <input type="checkbox" id="al-walnut" value="くるみ">
        <label for="al-walnut"><span class="icon">🌰</span>くるみ<span class="checkmark"></span></label>
      </div>
    </div>
  </div>

  <!-- その他 -->
  <div class="card">
    <div class="section-title">その他・備考</div>
    <textarea id="other-input" rows="3" placeholder="例：大豆アレルギーあり。ごま油はOK。"></textarea>
  </div>

  <!-- 用途選択 -->
  <div class="card">
    <div class="section-title">送り先</div>
    <div class="destination-options">
      <div class="destination-option active" id="dest-restaurant" onclick="selectDestination('restaurant')">
        <div class="dest-icon">🍽</div>
        <div class="dest-info">
          <div class="dest-label">飲食店・店員</div>
          <div class="dest-desc">一定時間後に自動消去</div>
        </div>
      </div>
      <div class="destination-option" id="dest-friend" onclick="selectDestination('friend')">
        <div class="dest-icon">👥</div>
        <div class="dest-info">
          <div class="dest-label">知人・幹事</div>
          <div class="dest-desc">消去しない</div>
        </div>
      </div>
    </div>
    <!-- タイマー選択（飲食店用のみ表示） -->
    <div id="timer-section">
      <div class="timer-label">表示時間</div>
      <div class="timer-options">
        <button class="timer-option" data-minutes="1" onclick="selectTimer(1)">1分</button>
        <button class="timer-option" data-minutes="15" onclick="selectTimer(15)">15分</button>
        <button class="timer-option" data-minutes="20" onclick="selectTimer(20)">20分</button>
      </div>
    </div>
  </div>

  <p class="no-selection-msg" id="no-sel-msg">⚠️ アレルゲンを1つ以上選んでください</p>

  <div class="action-buttons">
    <button class="btn-reset" onclick="resetCurrentProfile()">リセット</button>
    <button class="btn-generate" onclick="generateQR()">QRコードを生成する</button>
  </div>

  <!-- QRモーダル -->
  <div class="modal-overlay" id="modal" onclick="closeModal(event)">
    <div class="modal">
      <h2>QRコード</h2>
      <p class="modal-subtitle">店員さんに読み取ってもらってください</p>
      <p class="modal-privacy">📋 端末情報・位置情報・個人情報は一切取得しません</p>
      <div id="qr-container"></div>
      <div class="modal-tags" id="modal-tags"></div>
      <div class="modal-timer" id="modal-timer"></div>
      <div id="share-buttons" class="share-buttons">
      <button class="btn-copy" onclick="copyURL()">URLをコピー</button>
      <a id="btn-line" class="btn-line" href="" target="_blank">LINEで送る</a>
      </div>
      <button class="btn-close" onclick="closeModal(null)">閉じる</button>
    </div>
  </div>

  <script src="index.js"></script>
</body>
</html>
